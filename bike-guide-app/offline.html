<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Offline - Bike Guide PH</title>
  <link rel="icon" href="assets/icons/favicon.ico">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Poppins',sans-serif; background:linear-gradient(160deg,#1b4332,#2d6a4f); min-height:100vh; display:flex; align-items:center; justify-content:center; color:#fff; padding:30px; text-align:center; }
    .card { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:24px; padding:40px 28px; max-width:360px; width:100%; }
    .icon { font-size:4rem; margin-bottom:16px; display:block; }
    h1 { font-size:1.5rem; font-weight:800; margin-bottom:8px; }
    p  { font-size:0.85rem; opacity:0.8; line-height:1.7; margin-bottom:20px; }
    .tip-box { background:rgba(255,255,255,0.12); border-radius:14px; padding:14px; margin-bottom:20px; font-size:0.8rem; opacity:0.9; text-align:left; border-left:3px solid #f4722b; }
    .tip-label { font-size:0.65rem; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:#f4722b; margin-bottom:6px; }
    .retry-btn { background:#f4722b; color:#fff; border:none; border-radius:50px; padding:14px 32px; font-family:'Poppins',sans-serif; font-size:0.9rem; font-weight:700; cursor:pointer; width:100%; }
    .cached-links { display:flex; flex-direction:column; gap:8px; margin-top:14px; }
    .cached-link { background:rgba(255,255,255,0.12); color:#fff; text-decoration:none; padding:10px 18px; border-radius:50px; font-size:0.8rem; font-weight:600; }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon"><i class="fa-solid fa-wifi" style="opacity:0.4;"></i></span>
    <h1>You're Offline</h1>
    <p>No internet connection detected. But don't worry — your cached content is still available!</p>
    <div class="tip-box">
      <div class="tip-label">💡 Offline Tip</div>
      A bicycle is one of the few machines that doesn't need an internet connection to work. Neither does your training. Keep pedaling!
    </div>
    <button class="retry-btn" onclick="window.location.href='dashboard.html'">
      <i class="fa-solid fa-arrow-left"></i> Back to App
    </button>
    <div class="cached-links">
      <a class="cached-link" href="gear-guide.html"><i class="fa-solid fa-gears"></i> Gear Guide</a>
      <a class="cached-link" href="maintenance.html"><i class="fa-solid fa-wrench"></i> Maintenance</a>
      <a class="cached-link" href="warmup.html"><i class="fa-solid fa-person-running"></i> Warm-Up Routine</a>
    </div>
  </div>
</body>
</html>

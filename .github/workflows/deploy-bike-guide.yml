name: Deploy Bike Guide PH to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/bike-guide-app-planning-ciID4   # also deploy from dev branch
    paths:
      - 'bike-guide-app/**'
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload bike-guide-app as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Serve the bike-guide-app subfolder as the root of GitHub Pages
          path: bike-guide-app/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
